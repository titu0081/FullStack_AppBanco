<section class="form-page page-with-table">
  <div class="form-header">
    <h1>{{ tituloFormulario() }}</h1>
  </div>

  @if (cargando()) {
  <div class="form-card">Cargando cuenta...</div>
  } @else {
  <form class="form-card" [formGroup]="form" (ngSubmit)="guardar()">
    <div class="grid">
      <label>
        Numero Cuenta
        <input type="text" formControlName="numeroCuenta" />
      </label>

      <label>
        Tipo Cuenta
        <input type="text" formControlName="tipoCuenta" />
      </label>

      <label>
        Saldo Inicial
        <input type="number" step="0.01" formControlName="saldoInicial" />
      </label>

      <label>
        ID Cliente
        <input type="number" formControlName="idPersona" />
      </label>

      <label class="estado-check">
        <input type="checkbox" formControlName="estadoCuenta" />
        Activo
      </label>
    </div>

    <div class="acciones">
      <a class="boton" routerLink="/cuentas">Cancelar</a>
      <button
        class="boton"
        type="submit"
        [disabled]="form.invalid || guardando()"
      >
        {{ guardando() ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </form>
  }
</section>
