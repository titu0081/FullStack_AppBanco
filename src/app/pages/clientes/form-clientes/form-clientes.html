<section class="form-page page-with-table">
  <div class="form-header">
    <h1>{{ tituloFormulario() }}</h1>
  </div>

  @if (cargando()) {
    <div class="form-card">Cargando cliente...</div>
  } @else {
    <form class="form-card" [formGroup]="form" (ngSubmit)="guardar()">
      <div class="grid">
        <label>
          Nombre
          <input type="text" formControlName="nombre" />
        </label>

        <label>
          Identificacion
          <input type="number" formControlName="identificacion" />
        </label>

        <label>
          Edad
          <input type="number" formControlName="edad" />
        </label>

        <label>
          Genero
          <input type="text" formControlName="genero" />
        </label>

        <label>
          Direccion
          <input type="text" formControlName="direccion" />
        </label>

        <label>
          Telefono
          <input type="text" formControlName="telefono" />
        </label>

        <label>
          Password
          <input type="password" formControlName="password" />
        </label>

        <label class="estado-check">
          <input type="checkbox" formControlName="estado" />
          Activo
        </label>
      </div>

      <div class="acciones">
        <a class="boton" routerLink="/clientes">Cancelar</a>
        <button class="boton" type="submit" [disabled]="form.invalid || guardando()">
          {{ guardando() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  }
</section>
